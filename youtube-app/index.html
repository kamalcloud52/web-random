<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Lite PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF0000">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen text-white p-4">
    <div class="text-center">
        <!-- Logo Placeholder -->
        <div class="w-20 h-20 bg-red-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-red-900/20">
             <svg class="w-12 h-12 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.377.505 9.377.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
        </div>
        <h1 class="text-3xl font-bold mb-2">YouTube Lite</h1>
        <p class="text-gray-400 mb-8">Menghubungkan ke YouTube...</p>
        
        <!-- Loading Spinner -->
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-red-600 mx-auto"></div>
    </div>

    <script>
        // Registrasi Service Worker (Wajib untuk PWA)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW Registered'))
                    .catch(err => console.log('SW Failed', err));
            });
        }

        // Redirect otomatis setelah 1.5 detik agar user sempat melihat UI
        setTimeout(() => {
            window.location.href = "https://m.youtube.com";
        }, 1500);
    </script>
</body>
</html>
