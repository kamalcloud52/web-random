<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Data Tabungan</title>
    <link rel="icon" href="favicon.ico?v=Asetdirectweb">
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    <!-- Hubungkan ke file CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <h1>INPUT DATA TABUNGAN</h1>
    </div>

    <div class="container">
        <div class="input-card">
            <div class="form-group">
                <label>Nama Anak</label>
                <div class="name-selector" onclick="openModal('modal-name-list')">
                    <span id="selected-name-display">-- Pilih Nama --</span>
                    <span style="font-size: 12px; color: #888;">▼</span>
                </div>
                <input type="hidden" id="nama" value="">
            </div>

            <div class="form-group">
                <label>Nominal</label>
                <input type="number" id="nominal" placeholder="Contoh: 10/15/50">
            </div>

            <button class="btn-input" onclick="submitData()">INPUT</button>
        </div>

        <div class="monitoring-section">
            <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vS_eF4NHG4ywPfk82txug2fZgCO-0WrXfkaekeOE5gAYXssITlF-dKo6hFiJ2my7CJSk_HXLfWB_ytU/pubhtml?gid=560169226&single=true"></iframe>
        </div>
    </div>

    <div class="footer">
        <p>Designed by Kamal</p>
    </div>

    <!-- Modals (Nama List & Success) -->
    <div id="modal-name-list" class="modal-overlay" onclick="closeModal('modal-name-list')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">Pilih Nama</div>
            <div class="name-list-container">
                <!-- List nama tetap di sini agar mudah kamu edit di HTML -->
                <div class="name-option" onclick="selectName('Budi')">Budi</div>
                <div class="name-option" onclick="selectName('Dinda')">Dinda</div>
                <div class="name-option" onclick="selectName('Andi')">Andi</div>
                <div class="name-option" onclick="selectName('Amira')">Amira</div>
                <div class="name-option" onclick="selectName('Ziha')">Ziha</div>
                <div class="name-option" onclick="selectName('Dila')">Dila</div>
                <div class="name-option" onclick="selectName('Crisa')">Crisa</div>
                <div class="name-option" onclick="selectName('Faiz')">Faiz</div>
                <div class="name-option" onclick="selectName('Gilang')">Gilang</div>
                <div class="name-option" onclick="selectName('Hawari')">Hawari</div>
                <div class="name-option" onclick="selectName('Rio')">Rio</div>
                <div class="name-option" onclick="selectName('Rafa')">Rafa</div>
                <div class="name-option" onclick="selectName('Satya')">Satya</div>
                <div class="name-option" onclick="selectName('Nafila')">Nafila</div>
                <div class="name-option" onclick="selectName('Fira')">Fira</div>
                <div class="name-option" onclick="selectName('Chabibah')">Chabibah</div>
                <div class="name-option" onclick="selectName('Farel')">Farel</div>
            </div>
            <div class="modal-footer">
                <button onclick="closeModal('modal-name-list')" style="background: #eee; color: #333;" class="btn-input">Batal</button>
            </div>
        </div>
    </div>

    <div id="modal-success" class="modal-overlay">
        <div class="modal-content success-card">
            <div style="font-size: 50px; color: #4CAF50; margin-bottom: 10px;">✓</div>
            <h3>Laporan telah dicatat!</h3>
            <button class="btn-input" onclick="closeSuccessModal()">OKE</button>
        </div>
    </div>

    <!-- Hubungkan ke file JS -->
    <script src="script.js"></script>
</body>
</html>
